# Dictate default settings.
# Do NOT edit this file in the install folder — your personal settings live at
# %LOCALAPPDATA%\TranscribeDictate\settings.toml (created by the Settings window)
# and override anything here.

[whisper]
model_size = "auto"    # auto | tiny | base | small | medium | large-v3 | large-v3-turbo | distil-large-v3
device = "auto"        # auto | cuda | cpu   (auto detects your GPU and picks the best)
compute_type = "auto"  # auto | float16 | int8_float16 | int8
language = "en"        # "en", another ISO code (de, es, fr, ...), or "auto" to detect
beam_size = 5
initial_prompt = ""

[vad]
enabled = true
onset_threshold = 0.50
offset_threshold = 0.35
silence_timeout = 2.0            # seconds of silence before auto-stop; 0 = off

[hotkeys]
# mode = "push_to_talk"  -> hold a key, speak, release (like Wispr Flow)
# mode = "toggle"        -> tap a key to start, auto-stops on silence (hands-free)
mode = "push_to_talk"
push_to_talk_key = "ctrl_r"      # hold to talk. Right Ctrl avoids terminal/PowerShell/WSL clashes.
                                 # other good picks: "alt_r", "pause", "menu", "scroll_lock", "f9"
toggle_key = "f9"                # used only when mode = "toggle"
abort_key = "esc"                # cancel while recording (ignored otherwise)
copy_key = "f8"                  # copy last dictation to clipboard (rescue when text lands wrong)
mode_cycle_key = "f7"            # cycle dictation modes: auto -> prose -> code -> email -> auto
pause_key = "pause"              # pause/resume recording without stopping (Pause key)
rerecord_key = "f6"              # delete last dictation and immediately re-record

# ---- regex transforms (find-replace on transcripts) -----------------------
# [[transforms]]
# find = "gonna"
# replace = "going to"
# [[transforms]]
# find = "\\bwanna\\b"
# replace = "want to"

# ---- history ---------------------------------------------------------------
[history]
persist = false                  # save dictation history to disk (off by default for privacy)
limit = 100                      # max entries when persisted (session limit stays at 25)

[post_processing]
casing = "sentence"              # sentence | upper | lower | off
strip_trailing_period_short = true
auto_punctuation = "auto"        # "auto" | true | false
                                 # auto: on for small CPU models (they skip
                                 # punctuation), off for large models (they
                                 # punctuate natively — like Wispr Flow)

# ---- streaming (transcribe WHILE you talk) ---------------------------------
[streaming]
enabled = "auto"                 # "auto" | true | false
                                 # Long takes are transcribed in chunks while
                                 # you're still talking, so the text appears
                                 # near-instantly when you release the key.
                                 # auto: on for GPUs; on for CPUs only with
                                 # 8+ cores and a small model (weaker PCs
                                 # keep the classic transcribe-at-end path).

[cleanup]
remove_fillers = true            # strip "um", "uh", "erm", ...
level = "standard"               # off | light | standard | high
                                 # off: exactly what you said, spacing fixed only
                                 # light: filler words removed, nothing else touched
                                 # standard: fillers + dictionary + casing (default)
                                 # high: standard + AI grammar polish when a local
                                 # Ollama server is available
custom_fillers = []              # YOUR extra filler words to strip, on top of the
                                 # built-in um/uh/erm list. e.g.
                                 # custom_fillers = ["like", "you know", "basically"]
                                 # Multi-word entries work. Edit this here or in the
                                 # Settings window ("Extra filler words to strip").
ollama_polish = "auto"           # "auto" | true | false
                                 # auto: grammar polish via a LOCAL Ollama
                                 # server, enabled only when one is actually
                                 # running on this PC (probed at startup;
                                 # best installed model picked). Fail-open:
                                 # dictation never blocks if Ollama is down.
ollama_model = "hermes4"
ollama_endpoint = "http://127.0.0.1:11434"

[dictionary]
# Personal dictionary: spoken (any case) = written. Also boosts Whisper's
# spelling of these words. Examples:
# "woolies" = "Woolworths"
# "hello acrylic" = "Hello Acrylic"

[macros]
# Voice macros: speak a phrase, get a block of text typed. Multi-line is fine.
# These are merged into the dictionary at runtime — the difference is just
# that macros tend to be longer phrases that expand to full blocks.
# "insert my email" = "your@email.com"
# "sign off" = "Best regards,\nYour Name"
# "my address" = "123 Brisbane St, QLD 4000"

[audio]
# input_device = 3               # uncomment to pin a specific microphone
                                 # (see Settings window for the device list)

[injection]
mode = "auto"                    # auto | type | paste
                                 # auto: short text is typed (native feel),
                                 # long or multi-line text is pasted via a
                                 # clipboard swap (instant; clipboard restored)
paste_threshold = 300            # characters before auto switches to paste

[feedback]
sounds = true                    # short beep on record start/stop

[preview]
live_preview = true              # show what it's hearing in the pill while
                                 # you talk (GPU builds only; CPU skips it)

[overlay]
style = "equalizer"              # equalizer | blob
                                 # equalizer: clean grey bars (minimal, professional)
                                 # blob: morphing colour-shifting orb that reacts to
                                 # pitch and volume (impossible to miss)

[ui]
language = "auto"                # auto | en | bs
                                 # Language of the tray menu and notifications.
                                 # auto: follows the dictation language, so
                                 # Bosnian dictation gets a Bosnian interface.

# ---- context-aware per-app formatting --------------------------------------
# Dictate looks at which app has focus when you start talking and adapts.
# Built-in defaults cover terminals/IDEs (verbatim: no sentence-casing, no
# filler removal), chat apps (casual tone for the Ollama polish pass) and
# email (professional tone). Add your own like this:
#
# [app_profiles.notes]
# match = ["Obsidian.exe", "Notion.exe"]
# verbatim = false
# tone = "casual"
