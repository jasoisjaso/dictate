# Dictate default settings.
# Do NOT edit this file in the install folder — your personal settings live at
# %LOCALAPPDATA%\TranscribeDictate\settings.toml (created by the Settings window)
# and override anything here.

[whisper]
model_size = "auto"    # auto | tiny | base | small | medium | large-v3 | large-v3-turbo | distil-large-v3
device = "auto"        # auto | cuda | cpu   (auto detects your GPU and picks the best)
compute_type = "auto"  # auto | float16 | int8_float16 | int8
language = "en"        # "en", another ISO code (de, es, fr, ...), or "auto" to detect
beam_size = 5
initial_prompt = ""

[vad]
enabled = true
onset_threshold = 0.50
offset_threshold = 0.35
silence_timeout = 2.0            # seconds of silence before auto-stop; 0 = off

[hotkeys]
# mode = "push_to_talk"  -> hold a key, speak, release (like Wispr Flow)
# mode = "toggle"        -> tap a key to start, auto-stops on silence (hands-free)
mode = "push_to_talk"
push_to_talk_key = "ctrl_r"      # hold to talk. Right Ctrl avoids terminal/PowerShell/WSL clashes.
                                 # other good picks: "alt_r", "pause", "menu", "scroll_lock", "f9"
toggle_key = "f9"                # used only when mode = "toggle"
abort_key = "esc"                # cancel while recording (ignored otherwise)

[post_processing]
casing = "sentence"              # sentence | upper | lower | off
strip_trailing_period_short = true

[cleanup]
remove_fillers = true            # strip "um", "uh", "erm", ...
ollama_polish = false            # optional grammar pass via local Ollama (power feature;
                                 # fail-open: dictation never blocks if Ollama is down)
ollama_model = "hermes4"
ollama_endpoint = "http://127.0.0.1:11434"

[dictionary]
# Personal dictionary: spoken (any case) = written. Also boosts Whisper's
# spelling of these words. Examples:
# "woolies" = "Woolworths"
# "hello acrylic" = "Hello Acrylic"

[audio]
# input_device = 3               # uncomment to pin a specific microphone
                                 # (see Settings window for the device list)
