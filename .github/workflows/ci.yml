name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-win.txt

      - name: Install test dependencies
        # The unit tests are pure-python (engine logic, streaming cuts,
        # cleanup, config) — no CUDA, no audio hardware, no Qt loop needed.
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy faster-whisper==1.2.1
          pip install "tomli; python_version < '3.11'"

      - name: Run tests
        run: pytest tests/ -q
